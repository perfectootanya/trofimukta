<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Designer Runner</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f10;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

.hero{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

.content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
    pointer-events:none;
}

.content h1{
    color:white;
    font-size:clamp(48px,9vw,120px);
    line-height:0.9;
    letter-spacing:-4px;
}

.content p{
    margin-top:20px;
    color:rgba(255,255,255,0.65);
    font-size:18px;
}

canvas{
    position:absolute;
    inset:0;
}

.ui{
    position:absolute;
    top:30px;
    left:30px;
    z-index:20;
    color:white;
    font-size:18px;
}

.controls{
    position:absolute;
    bottom:35px;
    width:100%;
    text-align:center;
    color:rgba(255,255,255,0.5);
    font-size:14px;
    z-index:20;
}

.restart{
    position:absolute;
    top:30px;
    right:30px;
    z-index:20;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    color:white;
    padding:12px 20px;
    border-radius:999px;
    cursor:pointer;
    backdrop-filter:blur(12px);
    transition:0.3s;
}

.restart:hover{
    background:rgba(255,255,255,0.12);
}
</style>
</head>

<body>

<section class="hero">

    <div class="content">
        <h1>TATIANA<br>TROFIMUK</h1>
        <p>Product Designer — building digital experiences</p>
    </div>

    <div class="ui">
        SCORE: <span id="score">0</span>
    </div>

    <button class="restart" onclick="restartGame()">
        Restart
    </button>

    <div class="controls">
        PRESS SPACE / CLICK TO JUMP
    </div>

    <canvas id="game"></canvas>

</section>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    ground = h - 180;
});

let ground = h - 180;

const player = {
    x:120,
    y:ground,
    width:70,
    height:70,
    velocityY:0,
    gravity:0.9,
    jumpPower:-18,
    jumping:false
};

let obstacles = [];
let particles = [];
let score = 0;
let speed = 8;
let gameOver = false;

const scoreEl = document.getElementById("score");

function jump(){
    if(!player.jumping && !gameOver){
        player.velocityY = player.jumpPower;
        player.jumping = true;
    }
}

window.addEventListener("keydown", e => {
    if(e.code === "Space"){
        e.preventDefault();
        jump();
    }
});

window.addEventListener("click", jump);

function spawnObstacle(){

    const types = [
        { emoji:"🐞", width:50, height:50 },
        { emoji:"404", width:80, height:50 },
        { emoji:"❌", width:45, height:45 }
    ];

    const type = types[Math.floor(Math.random()*types.length)];

    obstacles.push({
        x:w + 100,
        y:ground,
        width:type.width,
        height:type.height,
        emoji:type.emoji
    });
}

setInterval(() => {
    if(!gameOver){
        spawnObstacle();
    }
}, 1800);

function drawBackgroundLines(){

    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;

    for(let i=0; i<w; i+=80){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,h);
        ctx.stroke();
    }
}

function drawGround(){

    ctx.beginPath();
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 2;

    ctx.moveTo(0, ground + 60);
    ctx.lineTo(w, ground + 60);

    ctx.stroke();
}

function drawPlayer(){

    ctx.save();

    ctx.translate(player.x, player.y);

    ctx.fillStyle = "#ffffff";

    ctx.beginPath();
    ctx.roundRect(0,0,player.width,player.height,18);
    ctx.fill();

    ctx.fillStyle = "#111";

    ctx.font = "30px Arial";
    ctx.fillText("F", 24, 45);

    ctx.restore();
}

function updatePlayer(){

    player.velocityY += player.gravity;
    player.y += player.velocityY;

    if(player.y >= ground){
        player.y = ground;
        player.velocityY = 0;
        player.jumping = false;
    }
}

function drawObstacles(){

    obstacles.forEach((obs,index)=>{

        obs.x -= speed;

        ctx.font = "42px Arial";
        ctx.fillText(obs.emoji, obs.x, obs.y + 42);

        if(
            player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y
        ){
            gameOver = true;
        }

        if(obs.x < -100){
            obstacles.splice(index,1);
            score++;
            scoreEl.innerText = score;

            if(score % 5 === 0){
                speed += 0.5;
            }
        }
    });
}

function drawParticles(){

    particles.forEach((p,index)=>{

        p.x -= p.speed;
        p.opacity -= 0.01;

        ctx.fillStyle = `rgba(255,255,255,${p.opacity})`;
        ctx.fillRect(p.x,p.y,p.size,p.size);

        if(p.opacity <= 0){
            particles.splice(index,1);
        }
    });
}

function createParticles(){

    particles.push({
        x:player.x,
        y:player.y + 60,
        size:4,
        speed:2 + Math.random()*3,
        opacity:0.4
    });
}

function drawGameOver(){

    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0,0,w,h);

    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";

    ctx.font = "bold 72px Inter";
    ctx.fillText("UX FAILED", w/2, h/2);

    ctx.font = "22px Inter";
    ctx.fillText("Restart the experience", w/2, h/2 + 60);
}

function animate(){

    ctx.clearRect(0,0,w,h);

    drawBackgroundLines();
    drawGround();

    createParticles();
    drawParticles();

    updatePlayer();

    drawPlayer();
    drawObstacles();

    if(gameOver){
        drawGameOver();
        return;
    }

    requestAnimationFrame(animate);
}

animate();

function restartGame(){

    obstacles = [];
    particles = [];
    score = 0;
    speed = 8;
    gameOver = false;

    player.y = ground;
    player.velocityY = 0;
    player.jumping = false;

    scoreEl.innerText = 0;

    animate();
}

</script>

</body>
</html>
